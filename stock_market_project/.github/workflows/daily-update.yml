name: Daily Data Update

on:
  schedule:
    # Run daily at 6:00 AM IST (12:30 AM UTC)
    - cron: '30 0 * * 1-5'  # Monday to Friday
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create data directory
      run: mkdir -p data

    - name: Run data update
      env:
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      run: |
        python src/data_updater.py

    - name: Commit and push updated data
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/*.csv
        git add economictimes_data.csv
        git commit -m "Daily data update: $(date +'%Y-%m-%d')" || echo "No changes to commit"
        git push
      continue-on-error: true

    - name: Create update log
      run: |
        echo "Update completed at $(date)" >> update_log.txt
        echo "Stock data updated: $(ls -la data/ | wc -l) files" >> update_log.txt
        echo "News articles: $(wc -l < economictimes_data.csv) total" >> update_log.txt